<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Sentence Builder</title><style>
body {
    font-family: Arial;
    background: #f5f7fb;
    text-align: center;
    padding: 40px;
}

h2 {
    margin-bottom: 10px;
}

.timer {
    margin-bottom: 20px;
    color: #666;
}

.container {
    max-width: 600px;
    margin: auto;
}

.box {
    min-height: 70px;
    border: 2px dashed #ccc;
    border-radius: 15px;
    padding: 10px;
    margin-bottom: 20px;
    transition: 0.3s;
}

.word {
    display: inline-block;
    background: white;
    padding: 10px 15px;
    margin: 5px;
    border-radius: 12px;
    cursor: pointer;
    border: 1px solid #ddd;
}

.correct {
    background: #d4f8d4 !important;
    border-color: green;
}

.wrong {
    background: #ffd6d6 !important;
    border-color: red;
}

button {
    padding: 10px 20px;
    border: none;
    background: #4caf50;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

.message {
    margin-top: 10px;
    font-weight: bold;
}
</style></head><body><h2>قم بترتيب الجملة الصحيحة</h2>
<div class="timer" id="timer">Time: 0s</div><div class="container"><div id="answer" class="box"></div>
<div id="words"></div>

<br>
<button onclick="check()">تحقق</button>

<div class="message" id="msg"></div>

<audio id="successSound" src="What is the project management.m4a"></audio>

</div><script>

let correctSentence = ["What", "is", "the", "project", "management"];
let shuffled = [...correctSentence].sort(() => Math.random() - 0.5);

let wordsDiv = document.getElementById("words");
let answerDiv = document.getElementById("answer");
let msg = document.getElementById("msg");

function renderWords() {
    wordsDiv.innerHTML = "";
    shuffled.forEach((word, index) => {
        let span = document.createElement("span");
        span.className = "word";
        span.innerText = word;
        span.onclick = () => moveWord(index);
        wordsDiv.appendChild(span);
    });
}

function moveWord(index) {
    let word = shuffled.splice(index, 1)[0];

    let span = document.createElement("span");
    span.className = "word";
    span.innerText = word;

    span.onclick = () => {
        shuffled.push(word);
        renderWords();
        span.remove();
    };

    answerDiv.appendChild(span);
    renderWords();
}

function check() {
    let userSentence = Array.from(answerDiv.children).map(e => e.innerText);

    if (JSON.stringify(userSentence) === JSON.stringify(correctSentence)) {

        answerDiv.classList.remove("wrong");
        answerDiv.classList.add("correct");

        msg.innerText = "✅ صح!";
        msg.style.color = "green";

        let audio = document.getElementById("successSound");
        audio.currentTime = 0;
        audio.play();

    } else {

        answerDiv.classList.remove("correct");
        answerDiv.classList.add("wrong");

        msg.innerText = "❌ غلط، حاول مرة ثانية";
        msg.style.color = "red";

        // رجّع الكلمات تحت + خلط
        shuffled = [...correctSentence].sort(() => Math.random() - 0.5);
        answerDiv.innerHTML = "";
        renderWords();
    }
}

// ⏱️ تايمر
let time = 0;
setInterval(() => {
    time++;
    document.getElementById("timer").innerText = "Time: " + time + "s";
}, 1000);

renderWords();

</script></body>
</html>
